# ── AB-Lab Dashboard — GitHub Actions CI/CD ──────────────────────────────────
#
# Triggers:
#   • push to main  → build + push multi-arch image tagged :latest + :<sha>
#   • pull request  → build only (no push), validates the Dockerfile
#
# Platforms built:
#   linux/amd64   (x86-64 — standard servers / VMs)
#   linux/arm64   (Raspberry Pi 4/5, Apple Silicon, Oracle Ampere)
#   linux/arm/v7  (Raspberry Pi 2/3, older ARM SBCs)
#
# Image published to:  ghcr.io/<owner>/ab-dashboard
# ─────────────────────────────────────────────────────────────────────────────

name: Build & Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "index.html"
      - "nginx/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ab-dashboard

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # needed to push to GHCR

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. QEMU — enables cross-platform emulation for ARM builds ──────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      # ── 3. Buildx — multi-platform builder ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host

      # ── 4. Login to GHCR (skip on PRs to avoid leaking tokens) ────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 5. Extract metadata (tags & labels) ───────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :latest on every push to main
            type=raw,value=latest,enable={{is_default_branch}}
            # short Git SHA  e.g. :sha-a1b2c3d
            type=sha,prefix=sha-,format=short
            # semver tags if you push a Git tag like v1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 6. Build (and push when on main) ──────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer cache — speeds up re-builds significantly
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print image digest ──────────────────────────────────────────────
      - name: Print image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags:         ${{ steps.meta.outputs.tags }}"
